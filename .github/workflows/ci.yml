name: CI

on:
  push:
    branches: [main, "test/**", test]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  lint-backend:
    name: Lint backend (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run ruff
        run: ruff check .

  test-backend:
    name: Test backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        env:
          DATABASE_URL: "sqlite:///:memory:"
        run: pytest --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore

  build-backend-image:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: [lint-backend, test-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (load locally)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: boursignal-backend:ci
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

  build-frontend-image:
    name: Build frontend image
    runs-on: ubuntu-latest
    needs: [lint-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image (load locally)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: boursignal-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  integration:
    name: Integration (docker compose up)
    runs-on: ubuntu-latest
    needs: [build-backend-image, build-frontend-image]
    env:
      DB_PASSWORD: rootpass
      MYSQL_ROOT_PASSWORD: rootpass
      SECRET_KEY: ci-secret
      FINNHUB_API_KEY: ""
    steps:
      - uses: actions/checkout@v4

      - name: Start the stack
        run: docker compose up -d --build

      - name: Wait for backend /api/health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:5000/api/health >/dev/null; then
              echo "Backend is up"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 3
          done
          echo "Backend never became healthy"
          docker compose logs backend
          exit 1

      - name: Verify frontend serves index
        run: curl -fsS http://localhost:3000/ -o /dev/null

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  publish-images:
    name: Push images to GHCR
    runs-on: ubuntu-latest
    needs: [integration]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image owner
        run: echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/boursignal-backend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/boursignal-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/boursignal-frontend:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/boursignal-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
