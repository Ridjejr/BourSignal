services:
  db:
    image: mysql:8.0
    container_name: boursignal-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD requis dans .env}
      MYSQL_DATABASE: boursignal
      MYSQL_USER: missilouAdmin
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requis dans .env}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: boursignal-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: missilouAdmin
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requis dans .env}
      DB_NAME: boursignal
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY requis dans .env}
      # Envoi d'emails (Gmail SMTP). Renseigne SMTP_USER / SMTP_PASSWORD dans .env
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    expose:
      - "5000"
    networks:
      - default
      - monitoring

  frontend:
    build: ./frontend
    container_name: boursignal-front
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:8080"

volumes:
  mysql_data:

networks:
  default:
  # Reseau partage avec ObservaStack pour que Prometheus puisse scraper /metrics.
  # Doit etre cree au prealable : docker network create monitoring
  monitoring:
    external: true
