services:
  db:
    image: mysql:8.0
    container_name: boursignal-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: boursignal
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: boursignal-api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_NAME: boursignal
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-docker-secret-key}
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    container_name: boursignal-front
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
