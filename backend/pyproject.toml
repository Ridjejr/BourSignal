[tool.ruff]
line-length = 100
target-version = "py313"
exclude = [
    "__pycache__",
    ".venv",
    "venv",
    "tests/__pycache__",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = [
    "E501",  # line too long, géré par le formatter
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra"
