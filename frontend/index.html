<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BourSignal — Surveillance Boursière</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind.config.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-bg-deep font-sans text-text-1 min-h-screen antialiased">
    <!-- NAVBAR -->
    <nav
      class="bg-bg-deep/80 backdrop-blur-xl border-b border-border/80 px-6 md:px-12 py-3 flex items-center gap-3 sticky top-0 z-50"
    >
      <a href="index.html" class="flex items-center gap-2.5 mr-1 shrink-0">
        <svg width="27" height="22" viewBox="0 0 27 22" fill="none" class="overflow-visible">
          <polyline points="1,18 7.5,18 7.5,12 14,12 14,7 20.5,7 20.5,2.5 26,2.5" stroke="#A78BFA" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></polyline>
          <circle cx="26" cy="2.5" r="2.6" fill="#A78BFA"></circle>
        </svg>
        <span class="font-mono font-bold text-lg tracking-tight"><span class="text-text-1">BOUR</span><span class="text-accent">SIGNAL</span></span>
      </a>
      <div class="hidden sm:flex items-center gap-1.5 ml-2">
        <a href="index.html" class="nav-pill is-active">Accueil</a>
        <a href="watchlist.html" class="nav-pill">Watchlist</a>
        <a href="alertes.html" class="nav-pill">Alertes</a>
      </div>
      <button
        id="nav-toggle"
        class="sm:hidden ml-auto p-2 rounded-lg hover:bg-bg-card transition-colors"
        aria-label="Menu"
        aria-expanded="false"
      >
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <div
        id="nav-ticker"
        class="nav-ticker ml-auto hidden lg:flex items-stretch bg-bg-card border border-border rounded-xl overflow-hidden"
      >
        <div class="ticker-item" data-ticker="AAPL">
          <span class="ticker-symbol">AAPL</span>
          <span class="ticker-price">213.55</span>
          <span class="ticker-change up">▲ +1.24%</span>
        </div>
        <div class="ticker-item" data-ticker="TSLA">
          <span class="ticker-symbol">TSLA</span>
          <span class="ticker-price">248.90</span>
          <span class="ticker-change up">▲ +3.41%</span>
        </div>
        <div class="ticker-item" data-ticker="SPY">
          <span class="ticker-symbol">SPY</span>
          <span class="ticker-price">533.27</span>
          <span class="ticker-change up">▲ +0.18%</span>
        </div>
      </div>
    </nav>
    <div
      id="nav-mobile-menu"
      class="hidden sm:hidden flex-col gap-1 px-6 py-3 bg-bg-deep border-b border-border/80"
    >
      <a href="index.html" class="nav-pill is-active w-full">Accueil</a>
      <a href="watchlist.html" class="nav-pill w-full">Watchlist</a>
      <a href="alertes.html" class="nav-pill w-full">Alertes</a>
    </div>

    <!-- HERO -->
    <main class="max-w-6xl mx-auto px-6 md:px-8 py-16 md:py-20">
      <div class="text-center mb-12">
        <p
          class="font-mono text-accent text-[11px] tracking-[0.22em] uppercase mb-5"
        >
          Surveillance Boursière
        </p>
        <h1 class="text-4xl md:text-5xl font-semibold tracking-tight leading-[1.1]">
          Surveillez vos actifs,<br />
          <span class="bg-accent-grad bg-clip-text text-transparent"
            >restez informé.</span
          >
        </h1>
        <p class="text-text-2 text-sm md:text-base mt-6 max-w-lg mx-auto">
          Recherchez un ticker pour consulter son cours et l'ajouter à votre
          watchlist.
        </p>
      </div>

      <!-- BARRE DE RECHERCHE -->
      <div class="max-w-xl mx-auto mb-16">
        <div
          class="group flex items-center bg-bg-card border border-border rounded-2xl px-2 py-2 shadow-card transition duration-200 focus-within:border-accent/60 focus-within:shadow-glow-accent"
        >
          <span
            class="font-mono text-text-3 text-sm pl-3 pr-1 select-none group-focus-within:text-accent transition"
            >⌕</span
          >
          <input
            type="text"
            id="search-input"
            placeholder="Rechercher un ticker... ex: AAPL, SPY"
            class="bg-transparent outline-none text-text-1 font-sans text-sm w-full placeholder-text-3 px-2"
          />
          <button
            id="search-btn"
            class="bg-accent-grad text-bg-deep font-semibold text-sm px-5 py-2.5 rounded-xl ml-2 transition duration-200 hover:brightness-110 hover:shadow-glow-accent active:scale-[0.98] whitespace-nowrap"
          >
            Rechercher
          </button>
        </div>
        <p id="search-error" class="text-danger text-xs mt-2.5 pl-1 hidden"></p>
      </div>

      <!-- GRILLE DES ACTIFS -->
      <div class="flex items-center gap-3 mb-5">
        <h2 class="text-text-2 text-xs font-semibold uppercase tracking-[0.16em]">
          Actifs populaires
        </h2>
        <div class="h-px flex-1 bg-border"></div>
      </div>
      <div
        id="actifs-grid"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"
      ></div>
    </main>

    <script src="js/app.js"></script>
      <script src="js/ticker.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/nav.js"></script>
  </body>
</html>
