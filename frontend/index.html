<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BourSignal — Surveillance Boursière</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind.config.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-bg-deep font-sans text-text-1 min-h-screen">
    <!-- NAVBAR -->
    <nav
      class="bg-bg-deep border-b border-border px-12 flex items-center gap-8 sticky top-0 z-50"
    >
      <div class="font-mono text-accent font-bold text-lg py-4 mr-4">
        BOUR<span class="text-text-1">SIGNAL</span>
      </div>
      <a
        href="index.html"
        class="text-text-1 text-sm font-medium py-5 border-b-2 border-accent"
        >Accueil</a
      >
      <a
        href="watchlist.html"
        class="text-text-2 text-sm font-medium py-5 border-b-2 border-transparent hover:text-text-1"
        >Watchlist</a
      >
      <a
        href="alertes.html"
        class="text-text-2 text-sm font-medium py-5 border-b-2 border-transparent hover:text-text-1"
        >Alertes</a
      >
      <div class="ml-auto flex items-center gap-2">
        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
        <span class="text-text-2 text-sm">LIVE</span>
      </div>
    </nav>

    <!-- HERO -->
    <main class="max-w-6xl mx-auto px-8 py-16">
      <div class="text-center mb-12">
        <p class="font-mono text-accent text-xs tracking-widest uppercase mb-4">
          Surveillance Boursière
        </p>
        <h1 class="text-4xl font-semibold mb-2">Surveillez vos actifs,</h1>
        <h1 class="text-4xl font-semibold text-accent mb-6">restez informé.</h1>
        <p class="text-text-2 text-sm">
          Recherchez un ticker pour consulter son cours et l'ajouter à votre
          watchlist.
        </p>
      </div>

      <!-- BARRE DE RECHERCHE -->
      <div class="max-w-xl mx-auto mb-16">
        <div
          class="flex items-center bg-bg-surface border border-border rounded-lg px-4 py-3"
        >
          <span class="text-text-3 mr-3">🔍</span>
          <input
            type="text"
            id="search-input"
            placeholder="Rechercher un ticker... ex: AAPL, SPY"
            class="bg-transparent outline-none text-text-1 font-sans text-sm w-full placeholder-text-3"
          />
          <button
            id="search-btn"
            class="bg-accent text-bg-deep font-semibold text-sm px-4 py-2 rounded-md ml-3 hover:opacity-90"
          >
            Rechercher
          </button>
        </div>
        <p id="search-error" class="text-danger text-xs mt-2 hidden"></p>
      </div>

      <!-- GRILLE DES ACTIFS -->
      <div
        id="actifs-grid"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"
      ></div>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>
