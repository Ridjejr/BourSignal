<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BourSignal — Gérer mon alerte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind.config.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-bg-deep font-sans text-text-1 min-h-screen antialiased">
    <nav
      class="bg-bg-deep/80 backdrop-blur-xl border-b border-border/80 px-6 md:px-12 py-3 flex items-center gap-3 sticky top-0 z-50"
    >
      <a href="index.html" class="flex items-center gap-2.5 mr-1 shrink-0">
        <svg width="27" height="22" viewBox="0 0 27 22" fill="none" class="overflow-visible">
          <polyline points="1,18 7.5,18 7.5,12 14,12 14,7 20.5,7 20.5,2.5 26,2.5" stroke="#A78BFA" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></polyline>
          <circle cx="26" cy="2.5" r="2.6" fill="#A78BFA"></circle>
        </svg>
        <span class="font-mono font-bold text-lg tracking-tight"><span class="text-text-1">BOUR</span><span class="text-accent">SIGNAL</span></span>
      </a>
      <div class="hidden sm:flex items-center gap-1.5 ml-2">
        <a href="index.html" class="nav-pill">Accueil</a>
        <a href="alertes.html" class="nav-pill">Alertes</a>
      </div>
      <div
        id="nav-ticker"
        class="nav-ticker ml-auto hidden lg:flex items-stretch bg-bg-card border border-border rounded-xl overflow-hidden"
      >
        <div class="ticker-item" data-ticker="AAPL">
          <span class="ticker-symbol">AAPL</span>
          <span class="ticker-price">213.55</span>
          <span class="ticker-change up">▲ +1.24%</span>
        </div>
        <div class="ticker-item" data-ticker="TSLA">
          <span class="ticker-symbol">TSLA</span>
          <span class="ticker-price">248.90</span>
          <span class="ticker-change up">▲ +3.41%</span>
        </div>
        <div class="ticker-item" data-ticker="SPY">
          <span class="ticker-symbol">SPY</span>
          <span class="ticker-price">533.27</span>
          <span class="ticker-change up">▲ +0.18%</span>
        </div>
      </div>
    </nav>

    <main class="max-w-xl mx-auto px-6 md:px-8 py-12">
      <p
        class="font-mono text-accent text-[11px] tracking-[0.22em] uppercase mb-2.5"
      >
        Accès par code
      </p>
      <h1 class="text-3xl font-semibold tracking-tight mb-2">Gérer mon alerte</h1>
      <p class="text-text-2 text-sm mb-8 max-w-md">
        Cette page utilise ton code de gestion — elle fonctionne depuis
        n'importe quel appareil, sans connexion.
      </p>

      <!-- Saisie manuelle du code si absent de l'URL -->
      <div
        id="code-form"
        class="bg-bg-card/80 border border-border rounded-2xl shadow-card p-6 mb-6 hidden"
      >
        <label class="field-label" for="code-input">Code de gestion</label>
        <div class="flex flex-col sm:flex-row gap-3">
          <input
            type="text"
            id="code-input"
            placeholder="Colle ton code ici"
            class="field flex-1 font-mono"
          />
          <button
            onclick="chargerAvecCodeSaisi()"
            class="bg-accent-grad text-bg-deep font-semibold text-sm px-5 py-2.5 rounded-xl transition duration-200 hover:brightness-110 hover:shadow-glow-accent active:scale-[0.98] whitespace-nowrap"
          >
            Accéder
          </button>
        </div>
      </div>

      <p id="message" class="text-danger text-sm mb-4 hidden"></p>

      <!-- Carte de l'alerte (remplie en JS) -->
      <div
        id="alerte-card"
        class="bg-bg-card/80 border border-border rounded-2xl shadow-card p-6 hidden"
      ></div>
    </main>

    <script>
      const API_URL = "/api";

      // Lecture des paramètres du lien (?id=..&code=..)
      const params = new URLSearchParams(window.location.search);
      const alerteId = params.get("id");
      let code = params.get("code");

      const STATUS_UI = {
        ACTIVE: {
          label: "ACTIVE",
          color: "text-green-400",
          bg: "bg-green-400/10 border-green-400/20",
          dot: "bg-green-400 shadow-glow-green",
        },
        SUSPENDED: {
          label: "SUSPENDUE",
          color: "text-warn",
          bg: "bg-warn/10 border-warn/25",
          dot: "bg-warn",
        },
        CANCELLED: {
          label: "ANNULÉE",
          color: "text-text-3",
          bg: "bg-bg-surface border-border",
          dot: "bg-text-3",
        },
      };

      function afficherMessage(msg, erreur = true) {
        const el = document.getElementById("message");
        el.textContent = msg;
        el.className = `${erreur ? "text-danger" : "text-green-400"} text-sm mb-4`;
      }

      function boutonsActions(alerte) {
        const btn = (action, label, hover) =>
          `<button onclick="changerEtat('${action}')" class="text-sm font-medium text-text-2 border border-border px-4 py-2 rounded-lg transition duration-200 hover:bg-bg-surface hover:${hover}">${label}</button>`;

        if (alerte.status === "ACTIVE") {
          return (
            btn("suspendre", "Suspendre", "text-warn hover:border-warn/60") +
            btn("annuler", "Annuler", "text-danger hover:border-danger/60")
          );
        }
        if (alerte.status === "SUSPENDED") {
          return (
            btn("reactiver", "Réactiver", "text-green-400 hover:border-green-400/60") +
            btn("annuler", "Annuler", "text-danger hover:border-danger/60")
          );
        }
        return `<span class="text-text-3 text-sm">Alerte annulée — aucune action possible.</span>`;
      }

      function afficherAlerte(alerte) {
        const ui = STATUS_UI[alerte.status] || STATUS_UI.CANCELLED;
        const card = document.getElementById("alerte-card");
        card.innerHTML = `
          <div class="flex items-center justify-between mb-5">
            <div class="flex items-center gap-3">
              <div class="w-11 h-11 rounded-xl bg-bg-surface border border-border flex items-center justify-center font-mono font-bold text-xs text-text-1">${alerte.ticker.slice(0, 4)}</div>
              <span class="font-mono font-bold text-xl text-text-1">${alerte.ticker}</span>
            </div>
            <span class="inline-flex items-center gap-1.5 text-[11px] font-semibold px-2.5 py-1 rounded-full border ${ui.bg} ${ui.color}">
              <span class="w-1.5 h-1.5 rounded-full ${ui.dot}"></span>${ui.label}
            </span>
          </div>
          <div class="bg-bg-surface/40 border border-border rounded-xl p-4 mb-6">
            <p class="text-text-2 text-sm mb-1">${alerte.condition}
              <span class="font-mono text-accent font-bold">${alerte.prix_cible}$</span></p>
            <p class="text-text-3 text-xs">${alerte.email}</p>
          </div>
          <div class="flex flex-wrap gap-3">${boutonsActions(alerte)}</div>
        `;
        card.classList.remove("hidden");
      }

      async function chargerAlerte() {
        try {
          const response = await fetch(`${API_URL}/alertes/${alerteId}/acces`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ code: code }),
          });
          const data = await response.json();

          if (data.error) {
            afficherMessage(data.error);
            document.getElementById("alerte-card").classList.add("hidden");
            document.getElementById("code-form").classList.remove("hidden");
            return;
          }

          document.getElementById("message").classList.add("hidden");
          document.getElementById("code-form").classList.add("hidden");
          afficherAlerte(data.alerte);
        } catch (error) {
          // Fallback PREVIEW uniquement (backend injoignable).
          document.getElementById("message").classList.add("hidden");
          document.getElementById("code-form").classList.add("hidden");
          afficherAlerte(DEMO_ALERTE);
        }
      }

      function chargerAvecCodeSaisi() {
        code = document.getElementById("code-input").value.trim();
        if (!code) return;
        chargerAlerte();
      }

      async function changerEtat(action) {
        try {
          const response = await fetch(`${API_URL}/alertes/${alerteId}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: action, code: code }),
          });
          const data = await response.json();

          if (data.error) {
            afficherMessage(data.error);
          } else {
            afficherMessage("Alerte mise à jour ✓", false);
            afficherAlerte(data.alerte);
          }
        } catch (error) {
          afficherMessage("Erreur de connexion au serveur.");
        }
      }

      // Données de démonstration (preview sans backend uniquement).
      const DEMO_ALERTE = {
        ticker: "AAPL",
        condition: "Supérieur à",
        prix_cible: 220.0,
        email: "moi@email.com",
        status: "ACTIVE",
      };

      // Au chargement : si l'id et le code sont dans l'URL, on charge direct.
      // Sinon on demande le code à l'utilisateur.
      if (!alerteId) {
        // En preview (lien sans paramètres), on affiche une carte de démonstration.
        afficherAlerte(DEMO_ALERTE);
      } else if (code) {
        chargerAlerte();
      } else {
        document.getElementById("code-form").classList.remove("hidden");
      }
    </script>
      <script src="js/ticker.js"></script>
    <script src="js/footer.js"></script>
  </body>
</html>
