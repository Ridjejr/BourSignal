<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BourSignal — Détails</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/tailwind.config.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="bg-bg-deep font-sans text-text-1 min-h-screen">
    <nav
      class="bg-bg-deep border-b border-border px-12 flex items-center gap-8 sticky top-0 z-50"
    >
      <div class="font-mono text-accent font-bold text-lg py-4 mr-4">
        BOUR<span class="text-text-1">SIGNAL</span>
      </div>
      <a
        href="index.html"
        class="text-text-2 text-sm font-medium py-5 border-b-2 border-transparent hover:text-text-1"
        >Accueil</a
      >
      <a
        href="watchlist.html"
        class="text-text-2 text-sm font-medium py-5 border-b-2 border-transparent hover:text-text-1"
        >Watchlist</a
      >
      <a
        href="alertes.html"
        class="text-text-2 text-sm font-medium py-5 border-b-2 border-transparent hover:text-text-1"
        >Alertes</a
      >
      <div class="ml-auto flex items-center gap-2">
        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
        <span class="text-text-2 text-sm">LIVE</span>
      </div>
    </nav>

    <main class="max-w-4xl mx-auto px-8 py-12">
      <!-- LOADING -->
      <div id="loading" class="text-center py-16">
        <p class="text-text-2">Chargement...</p>
      </div>

      <!-- ERREUR -->
      <div id="error" class="text-center py-16 hidden">
        <p class="text-danger">Actif introuvable.</p>
        <a
          href="index.html"
          class="inline-block mt-4 bg-accent text-bg-deep font-semibold text-sm px-6 py-2 rounded-md hover:opacity-90"
          >Retour à l'accueil</a
        >
      </div>

      <!-- CONTENU -->
      <div id="content" class="hidden">
        <!-- HEADER -->
        <div class="flex items-center justify-between mb-8">
          <div class="flex items-center gap-4">
            <span
              id="detail-ticker"
              class="bg-accent2 text-text-1 font-mono font-bold text-sm px-3 py-1.5 rounded"
            ></span>
            <div>
              <h1 id="detail-nom" class="text-2xl font-semibold"></h1>
              <p id="detail-info" class="text-text-2 text-sm"></p>
            </div>
          </div>
          <div class="text-right">
            <p id="detail-prix" class="font-mono text-3xl font-bold"></p>
            <p id="detail-variation" class="font-mono text-sm mt-1"></p>
          </div>
        </div>

        <!-- GRILLE COTATION -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
          <div class="bg-bg-card border border-border rounded-lg p-4">
            <p class="text-text-3 text-xs uppercase tracking-wider mb-1">
              Ouverture
            </p>
            <p id="detail-ouverture" class="font-mono text-lg font-bold"></p>
          </div>
          <div class="bg-bg-card border border-border rounded-lg p-4">
            <p class="text-text-3 text-xs uppercase tracking-wider mb-1">
              Plus haut
            </p>
            <p id="detail-haut" class="font-mono text-lg font-bold"></p>
          </div>
          <div class="bg-bg-card border border-border rounded-lg p-4">
            <p class="text-text-3 text-xs uppercase tracking-wider mb-1">
              Plus bas
            </p>
            <p id="detail-bas" class="font-mono text-lg font-bold"></p>
          </div>
          <div class="bg-bg-card border border-border rounded-lg p-4">
            <p class="text-text-3 text-xs uppercase tracking-wider mb-1">
              Clôture préc.
            </p>
            <p id="detail-cloture" class="font-mono text-lg font-bold"></p>
          </div>
        </div>

        <!-- BOUTONS -->
        <div class="flex gap-3 mb-8">
          <button
            id="btn-watchlist"
            class="bg-accent text-bg-deep font-semibold text-sm px-5 py-2 rounded hover:opacity-90"
          >
            Ajouter à la watchlist
          </button>
          <button
            id="btn-alerte"
            onclick="window.location.href = 'alertes.html'"
            class="bg-warn text-bg-deep font-semibold text-sm px-5 py-2 rounded hover:opacity-90"
          >
            Créer une alerte
          </button>
        </div>

        <!-- INFO TEMPS REEL -->
        <div class="flex items-center gap-2 text-text-3 text-xs">
          <span class="w-2 h-2 bg-green-500 rounded-full"></span>
          <span>Données en temps réel</span>
          <span id="detail-maj" class="ml-2"></span>
        </div>
      </div>
    </main>

    <script>
      const API_URL = "http://127.0.0.1:5000/api";

      async function apiFetch(url, options = {}) {
        options.credentials = "include";
        if (options.body) {
          options.headers = {
            "Content-Type": "application/json",
            ...options.headers,
          };
        }
        return fetch(url, options);
      }

      async function chargerDetails() {
        const params = new URLSearchParams(window.location.search);
        const ticker = params.get("ticker");
        console.log("Ticker récupéré:", ticker);

        if (!ticker) {
          document.getElementById("loading").classList.add("hidden");
          document.getElementById("error").classList.remove("hidden");
          return;
        }

        try {
          const response = await apiFetch(`${API_URL}/actifs/${ticker}`);
          const data = await response.json();

          if (!response.ok) {
            document.getElementById("loading").classList.add("hidden");
            document.getElementById("error").classList.remove("hidden");
            return;
          }

          const actif = data.actif;
          const cotation = data.cotation;
          const variation = cotation ? cotation.variation_pourcent : 0;
          const isHausse = variation >= 0;

          // Header
          document.getElementById("detail-ticker").textContent = actif.ticker;
          document.getElementById("detail-nom").textContent = actif.nom;
          document.getElementById("detail-info").textContent =
            `${actif.exchange} · ${actif.type} · ${actif.devise}`;

          // Prix
          document.getElementById("detail-prix").textContent = cotation
            ? `${cotation.prix_actuel.toFixed(2)} $`
            : "N/A";
          const variationEl = document.getElementById("detail-variation");
          variationEl.textContent = `${isHausse ? "▲" : "▼"} ${cotation ? cotation.variation.toFixed(2) : 0} (${isHausse ? "+" : ""}${variation.toFixed(2)}%)`;
          variationEl.className = `font-mono text-sm mt-1 ${isHausse ? "text-green-400" : "text-danger"}`;

          // Cotation détaillée
          document.getElementById("detail-ouverture").textContent = cotation
            ? cotation.ouverture.toFixed(2)
            : "N/A";
          document.getElementById("detail-haut").textContent = cotation
            ? cotation.plus_haut.toFixed(2)
            : "N/A";
          document.getElementById("detail-bas").textContent = cotation
            ? cotation.plus_bas.toFixed(2)
            : "N/A";
          document.getElementById("detail-cloture").textContent = cotation
            ? cotation.cloture_precedente.toFixed(2)
            : "N/A";

          // Mise à jour
          if (cotation && cotation.date_mise_a_jour) {
            const date = new Date(cotation.date_mise_a_jour);
            document.getElementById("detail-maj").textContent =
              `Mis à jour le ${date.toLocaleDateString("fr-FR")} à ${date.toLocaleTimeString("fr-FR")}`;
          }

          // Bouton watchlist
          document.getElementById("btn-watchlist").onclick = async () => {
            const res = await apiFetch(`${API_URL}/watchlist`, {
              method: "POST",
              body: JSON.stringify({ ticker: actif.ticker }),
            });
            const result = await res.json();
            alert(result.success || result.error);
          };

          // Afficher le contenu
          document.getElementById("loading").classList.add("hidden");
          document.getElementById("content").classList.remove("hidden");
        } catch (error) {
          document.getElementById("loading").classList.add("hidden");
          document.getElementById("error").classList.remove("hidden");
        }
      }

      chargerDetails();
    </script>
  </body>
</html>
